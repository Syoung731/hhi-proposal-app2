<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Browser window frame -->
  <rect x="0" y="0" width="800" height="360" fill="#F5F6F8" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="36" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>
  <circle cx="14" cy="18" r="5" fill="#FF5F57"/>
  <circle cx="32" cy="18" r="5" fill="#FEBC2E"/>
  <circle cx="50" cy="18" r="5" fill="#28C840"/>

  <!-- URL bar -->
  <rect x="80" y="9" width="640" height="18" rx="9" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="92" y="22" font-size="11" fill="#6B7280" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace">chrome://extensions</text>

  <!-- Page header -->
  <text x="32" y="76" font-size="20" font-weight="600" fill="#202124">Extensions</text>

  <!-- Developer Mode toggle ON (right side) -->
  <text x="610" y="76" font-size="13" fill="#3C4043">Developer mode</text>
  <rect x="725" y="62" width="42" height="22" rx="11" fill="#1A73E8"/>
  <circle cx="756" cy="73" r="9" fill="#FFFFFF"/>

  <!-- Three dev-mode buttons appear -->
  <!-- Load unpacked (highlighted) -->
  <rect x="32" y="100" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#DC2626" stroke-width="2.5"/>
  <text x="97" y="122" font-size="13" font-weight="500" fill="#1A73E8" text-anchor="middle">Load unpacked</text>

  <!-- Pack extension -->
  <rect x="174" y="100" width="130" height="34" rx="6" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1"/>
  <text x="239" y="122" font-size="13" fill="#5F6368" text-anchor="middle">Pack extension</text>

  <!-- Update -->
  <rect x="316" y="100" width="80" height="34" rx="6" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1"/>
  <text x="356" y="122" font-size="13" fill="#5F6368" text-anchor="middle">Update</text>

  <!-- Annotation arrow + label -->
  <path d="M 250 230 Q 180 200 110 145" stroke="#DC2626" stroke-width="2" fill="none"/>
  <polygon points="110,145 119,150 113,138" fill="#DC2626"/>
  <text x="200" y="248" font-size="14" font-weight="600" fill="#DC2626">Click "Load unpacked"</text>
  <text x="200" y="266" font-size="12" fill="#3C4043">→ pick the unzipped zillow-importer folder</text>

  <!-- Empty extensions area -->
  <rect x="32" y="160" width="736" height="170" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Step badge -->
  <circle cx="32" cy="48" r="13" fill="#1A73E8"/>
  <text x="32" y="53" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
</svg>
